name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build, release & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Minify CSS
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump package.json version
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gallo ${{ github.ref_name }}"
          body: |
            ## Gallo ${{ github.ref_name }}

            ### Install
            ```html
            <!-- CDN -->
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gallocss/gallo@${{ steps.version.outputs.VERSION }}/gallo.min.css">
            ```
            ```bash
            # npm
            npm install @gallocss/gallo
            ```

            ### Changelog
            See [commits since last release](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}).
          files: |
            gallo.css
            gallo.min.css
          draft: false
          prerelease: false

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}